<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Konkurssikone Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        select { padding: 10px; width: 100%; margin-bottom: 20px; font-size: 16px; }
        .meta { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>📉 Konkurssikone</h1>
    <p>Seuraa alueesi tuoreimpia konkurssi-ilmoituksia (30 vrk).</p>

    <select id="kuntavalinta">
        <option value="">Valitse kunta...</option>
    </select>

    <div id="tulokset">Ladataan tietoja...</div>

    <script>
     async function lataaDataSuoraan() {
    const tänään = new Date();
    const kkSitten = new Date(tänään.setDate(tänään.getDate() - 30)).toISOString().split('T')[0];
    
    // Suora URL PRH:n rajapintaan
    const url = `https://avoindata.prh.fi/bis/v1/announcements?maxResults=100&announcementType=KONKURSSI&entryDateFrom=${kkSitten}`;

    try {
        const response = await fetch(url); // Tässä kohtaa CORS yleensä estää latauksen
        const rawData = await response.json();
        const data = rawData.results;
        
        // ... (tässä sama renderöintilogiikka kuin aiemmin)
        console.log("Haku onnistui suoraan rajapinnasta!");
    } catch (error) {
        console.error("Haku epäonnistui (todennäköisesti CORS):", error);
        document.getElementById('tulokset').innerHTML = "Virhe: Rajapinta ei salli suoraa hakua selaimesta.";
    }
}
    </script>
</body>
</html>
